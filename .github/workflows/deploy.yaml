name: AtlaSent Deploy Gate (Demo)

# Demo: gate deploys through AtlaSent before they execute.
# In your repo, replace uses: ./ with: uses: AtlaSent-Systems-Inc/atlasent-action@v1

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_denial:
        description: 'Force a denial (sets approvals=0, change_window=false)'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - prod
          - staging
        default: prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AtlaSent authorization gate
        id: gate
        uses: ./
        with:
          api-key: ${{ secrets.ATLASENT_API_KEY }}
          action: production-deploy
          environment: ${{ inputs.environment || 'prod' }}
          fail-on-deny: 'true'

      # Only reached if AtlaSent authorized the deploy
      - name: Deploy to ${{ inputs.environment || 'prod' }}
        run: |
          echo "Decision:      ${{ steps.gate.outputs.decision }}"
          echo "Evaluation ID: ${{ steps.gate.outputs.evaluation-id }}"
          echo "Proof Hash:    ${{ steps.gate.outputs.proof-hash }}"
          echo "Risk Score:    ${{ steps.gate.outputs.risk-score }}"
          echo ""
          echo "Replace this with your real deploy command."
