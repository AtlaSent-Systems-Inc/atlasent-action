name: AtlaSent Deploy Gate (Demo)

# Demo: gate deploys through AtlaSent before they execute.
# In your repo, replace uses: ./ with: uses: AtlaSent-Systems-Inc/atlasent-action@v1

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - prod
          - staging
        default: prod

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: AtlaSent authorization gate
        id: gate
        uses: ./
        env:
          ATLASENT_API_KEY: ${{ secrets.ATLASENT_API_KEY }}
          ATLASENT_BASE_URL: ${{ secrets.ATLASENT_BASE_URL }}
        with:
          action: production.deploy
          actor: ${{ github.actor }}
          environment: ${{ inputs.environment || 'prod' }}

      # Only reached if AtlaSent authorized the deploy (verified=true)
      - name: Deploy to ${{ inputs.environment || 'prod' }}
        run: |
          echo "Decision:     ${{ steps.gate.outputs.decision }}"
          echo "Verified:     ${{ steps.gate.outputs.verified }}"
          echo "Evaluation:   ${{ steps.gate.outputs.evaluation-id }}"
          echo "Proof hash:   ${{ steps.gate.outputs.proof-hash }}"
          echo "Risk score:   ${{ steps.gate.outputs.risk-score }}"
          echo ""
          echo "Replace this with your real deploy command."
