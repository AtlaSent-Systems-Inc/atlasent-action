name: AtlaSent Deploy Gate (Demo)

# Demo: gate deploys through AtlaSent before they execute.
# In your repo replace `uses: ./` with:
#   uses: AtlaSent-Systems-Inc/atlasent-action@v2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        type: choice
        options: [production, staging]
        default: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AtlaSent authorization gate
        id: gate
        uses: ./
        with:
          atlasent-api-url: ${{ secrets.ATLASENT_API_URL }}
          atlasent-api-key: ${{ secrets.ATLASENT_API_KEY }}
          action-id: ci.production-deploy
          environment: ${{ inputs.environment || 'production' }}
          actor-id: ${{ github.actor }}
          context: '{"workflow":"${{ github.workflow }}","run_id":"${{ github.run_id }}"}'
          fail-on-deny: 'true'

      - name: Deploy to ${{ inputs.environment || 'production' }}
        run: |
          echo "Decision:      ${{ steps.gate.outputs.decision }}"
          echo "Risk level:    ${{ steps.gate.outputs.risk-level }}"
          echo "Risk score:    ${{ steps.gate.outputs.risk-score }}"
          echo "Evaluation ID: ${{ steps.gate.outputs.evaluation-id }}"
          echo "Permit ID:     ${{ steps.gate.outputs.permit-id }}"
          echo ""
          echo "Replace this with your real deploy command."
