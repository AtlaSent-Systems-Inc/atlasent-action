name: AtlaSent Deploy Gate (Demo)

# Demo: gate deploys through AtlaSent before they execute.
# In your repo, replace uses: ./ with: uses: AtlaSent-Systems-Inc/atlasent-action@v2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action_id:
        description: 'Action identifier to evaluate'
        required: false
        type: string
        default: ci.production-deploy
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - production
          - staging
        default: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AtlaSent authorization gate
        id: gate
        uses: ./
        with:
          atlasent-api-url: ${{ vars.ATLASENT_API_URL }}
          atlasent-api-key: ${{ secrets.ATLASENT_API_KEY }}
          action-id: ${{ inputs.action_id || 'ci.production-deploy' }}
          environment: ${{ inputs.environment || 'production' }}
          actor-id: ${{ github.actor }}
          context: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "workflow": "${{ github.workflow }}"
            }
          fail-on-deny: 'true'

      # Only reached if AtlaSent authorized the deploy
      - name: Deploy to ${{ inputs.environment || 'production' }}
        run: |
          echo "Decision:      ${{ steps.gate.outputs.decision }}"
          echo "Evaluation ID: ${{ steps.gate.outputs.evaluation-id }}"
          echo "Permit ID:     ${{ steps.gate.outputs.permit-id }}"
          echo "Risk level:    ${{ steps.gate.outputs.risk-level }}"
          echo ""
          echo "Replace this with your real deploy command."
