# Reusable workflow: scan a repo for committed secrets.
#
# Usage from a caller repo:
#
#   jobs:
#     scan:
#       uses: atlasent-systems-inc/atlasent-action/.github/workflows/no-secrets-scan.yml@main
#       with:
#         config-path: .gitleaks.toml   # optional
#
# On a pull request, only the diff is scanned (fast, low false positives).
# On push to a default branch, the full history is scanned.
name: no-secrets-scan

on:
  workflow_call:
    inputs:
      config-path:
        description: "Path to gitleaks config in the caller repo"
        required: false
        type: string
        default: ".gitleaks.toml"
      gitleaks-version:
        description: "Pinned gitleaks version"
        required: false
        type: string
        default: "8.21.2"
      fail-on-finding:
        description: "Fail the job if any secret is detected"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          v="${{ inputs.gitleaks-version }}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${v}/gitleaks_${v}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Determine scan scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=protect" >> "$GITHUB_OUTPUT"
            echo "log-opts=--log-opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=detect" >> "$GITHUB_OUTPUT"
            echo "log-opts=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run gitleaks
        id: scan
        continue-on-error: true
        run: |
          set +e
          mkdir -p .no-secrets
          cfg=""
          if [ -f "${{ inputs.config-path }}" ]; then cfg="--config=${{ inputs.config-path }}"; fi
          gitleaks ${{ steps.scope.outputs.mode }} \
            $cfg \
            --redact \
            --report-format=json \
            --report-path=.no-secrets/findings.json \
            --exit-code=2 \
            ${{ steps.scope.outputs.log-opts }}
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Download explainer
        run: |
          curl -sSL "https://raw.githubusercontent.com/atlasent-systems-inc/atlasent-action/${{ github.sha }}/scripts/no-secrets/explain.sh" -o /tmp/explain.sh \
            || curl -sSL "https://raw.githubusercontent.com/atlasent-systems-inc/atlasent-action/main/scripts/no-secrets/explain.sh" -o /tmp/explain.sh
          chmod +x /tmp/explain.sh

      - name: Explain findings
        if: always()
        run: /tmp/explain.sh .no-secrets/findings.json

      - name: Fail if secrets found
        if: ${{ inputs.fail-on-finding && steps.scan.outputs.exit == '2' }}
        run: |
          echo "::error::Secrets detected. See the job summary for plain-language explanations and how to fix each one."
          exit 1
