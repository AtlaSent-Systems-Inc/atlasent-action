name: Test Action

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  test-action-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml
        run: |
          python3 -c "
          import yaml, sys
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          required = ['name', 'description', 'inputs', 'outputs', 'runs']
          for key in required:
              if key not in data:
                  print(f'Missing top-level key: {key}', file=sys.stderr)
                  sys.exit(1)
          expected_inputs = ['atlasent-api-url', 'atlasent-api-key', 'action-id']
          for key in expected_inputs:
              if key not in data['inputs']:
                  print(f'Missing required input: {key}', file=sys.stderr)
                  sys.exit(1)
          expected_outputs = ['decision', 'permit-id', 'risk-level', 'evaluation-id']
          for key in expected_outputs:
              if key not in data['outputs']:
                  print(f'Missing output: {key}', file=sys.stderr)
                  sys.exit(1)
          print('action.yml valid')
          "

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  dist-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist/ matches source
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git status --porcelain dist/
            git diff --stat dist/
            exit 1
          fi
          echo "dist/ is up to date."
