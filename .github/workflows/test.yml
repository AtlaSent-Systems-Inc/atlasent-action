name: Test Action

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  test-action-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml
        run: |
          # Verify action.yml is valid YAML and has required keys
          python3 -c "import yaml,sys; d=yaml.safe_load(open('action.yml')); missing=[k for k in ['name','description','inputs','outputs','runs'] if k not in d]; [print('Missing key: '+k,file=sys.stderr) for k in missing]; sys.exit(1) if missing else print('action.yml valid')"

      - name: Check api-key input present
        run: |
          grep -q 'api-key' action.yml && echo 'api-key input found'

      - name: Check fail-on-deny input present
        run: |
          grep -q 'fail-on-deny' action.yml && echo 'fail-on-deny input found'

      - name: Check dist entrypoint declared
        run: |
          grep -q 'dist/index.js' action.yml && echo 'dist/index.js entrypoint found'
