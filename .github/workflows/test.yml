name: Test Action

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  test-action-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml
        run: |
          python3 -c "import yaml,sys; d=yaml.safe_load(open('action.yml')); missing=[k for k in ['name','description','inputs','outputs','runs'] if k not in d]; sys.exit(1) if missing else print('action.yml valid')"

      - name: Check evaluate step present
        run: |
          grep -q 'v1/evaluate' src/batch.ts && echo 'evaluate step found'

      - name: Check verify step present
        run: |
          grep -q 'v1-verify-permit' src/gate.ts && echo 'verify step found'

      - name: Check fail-closed logic
        run: |
          grep -q 'fail-closed' src/gate.ts && echo 'fail-closed logic found'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and typecheck
        run: |
          npm install
          npm run typecheck
          npm run build

      - name: Run SIM tests
        run: npm test
