name: 'AtlaSent Gate'
description: 'Enforce real-time authorization gates on deployments and critical CI/CD actions with cryptographic audit trails'
branding:
  icon: 'shield'
  color: 'green'
inputs:
  action:
    description: 'Protected action type (e.g., production.deploy, database.migration.apply, hr.employee.offboard). See the AtlaSent catalog for all 19 built-in types. Used for single-eval path; ignored when evaluations or policy-sync is set.'
    required: false
  actor:
    description: 'Actor identity (defaults to github.actor). Used for single-eval path.'
    required: false
    default: '${{ github.actor }}'
  target-id:
    description: 'Target resource being acted on (service name, artifact id, etc). Threaded into both top-level target_id and context.target_id so policies can gate on what is being deployed, not just who is deploying.'
    required: false
  environment:
    description: 'Environment (defaults to live for main branch, test otherwise)'
    required: false
  api-url:
    description: 'AtlaSent API URL base. Defaults to ATLASENT_BASE_URL when set, otherwise https://api.atlasent.io. IMPORTANT: the api.atlasent.io apex 404s unless a custom domain is verified — for a self-hosted or pilot deployment set this to your project URL ending in /functions/v1, or the gate will appear broken. The action only calls /v1-evaluate and /v1-verify-permit runtime routes.'
    required: false
    default: 'https://api.atlasent.io'
  fail-on-deny:
    description: 'Deprecated in V1 pilot mode: deny/hold/escalate always fail closed regardless of this value.'
    required: false
    default: 'true'
  context:
    description: 'JSON context to include in the evaluation (optional). Used for single-eval path. Values here override anything the action derives automatically (e.g. an explicit `approvals` count wins over PR-review-derived approvals).'
    required: false
    default: '{}'
  approvals-from:
    description: |
      Where the `context.approvals` count comes from on the single-eval path.
        - "pr-reviews" (default): count distinct reviewers whose latest PR
          review is APPROVED, derived from the GitHub API, and inject as
          context.approvals + context.approving_reviewers. Lets the
          `allow-2-approvals-change-window` policy template work out of the box.
          Requires GITHUB_TOKEN (pass `env: GITHUB_TOKEN: ${{ github.token }}`).
        - "none": do not derive approvals; supply them via the `context` input.
      Best-effort and fail-open-to-zero: any API failure yields 0 approvals,
      which denies a count-gated deploy (the fail-closed direction).
    required: false
    default: 'pr-reviews'
  evaluations:
    description: 'JSON array of evaluation requests for batch mode, e.g. [{"action":"production.deploy","actor":"alice"}]. When set, single-eval inputs (action, actor, context) are ignored.'
    required: false
  wait-for-id:
    description: 'Evaluation ID to block on until it reaches a terminal state (allow/deny). Used with hold/escalate decisions that require async approval.'
    required: false
  wait-timeout-ms:
    description: 'Maximum milliseconds to wait for a terminal decision when wait-for-id is set (default: 600000 = 10 min).'
    required: false
    default: '600000'
  v2-batch:
    description: 'Enable the /v1-evaluate/batch endpoint for batch evaluations (default: false, falls back to sequential /v1-evaluate loop).'
    required: false
    default: 'false'
  v2-streaming:
    description: 'Enable Server-Sent Events stream for wait-for-id polling (default: false, falls back to HTTP polling).'
    required: false
    default: 'false'
  financial-governance:
    description: 'Enable financial governance advisory ("advisory" or "")'
    required: false
    default: ''
  financial-action-value:
    description: 'Dollar value of the financial action being evaluated'
    required: false
    default: ''
  financial-action-currency:
    description: 'Currency code for the financial action value'
    required: false
    default: 'USD'
  receipt-signing-key-id:
    description: |
      Key ID recorded in the evidence receipt for rotation tracking.
      Paired with the ATLASENT_RECEIPT_SIGNING_SECRET Actions secret so
      offline verifiers know which key to use. Omit if you do not rotate
      signing keys or do not need signed receipts.
    required: false
    default: ''
  # ── Policy Sync ─────────────────────────────────────────────────────────────────────────────
  policy-sync:
    description: |
      When "true", run in policy sync mode: read a JSON bundle file and post it
      to v1-policy-sync. CI fails when the run is rejected or invalid.
      Cannot be combined with the evaluations or action inputs.
    required: false
    default: 'false'
  policy-bundle:
    description: |
      Path to the policy bundle JSON file, relative to the repository root.
      Must be a JSON array of policy entries: [{name, body, description?, tags?}].
      Required when policy-sync is "true".
    required: false
  policy-source:
    description: 'Source label written into the sync run record (defaults to "github-action").'
    required: false
    default: 'github-action'
  policy-dry-run:
    description: |
      When "true" (default), submit as a dry-run to preview the diff without
      applying. Set to "false" on the default branch to apply changes live.
    required: false
    default: 'true'
  # ── Behavior Insights ─────────────────────────────────────────────────────────────────────
  insights-org-id:
    description: |
      Organization ID for behavior insights campaign evaluation. When set,
      the action runs a campaign evaluate call after a successful authorization
      (best-effort: never blocks or reverses the gate decision).
    required: false
  insights-subject-id:
    description: 'Subject ID for insights evaluation. Defaults to the actor value.'
    required: false
  insights-session-count:
    description: 'Number of sessions for the subject, used by session_count trigger campaigns.'
    required: false
    default: ''
  # ── Release-candidate post-deploy verification ────────────────────────────────────────────
  release-mode:
    description: |
      When "register-and-verify", run as a POST-deploy step against the
      atlasent-control-plane release-verification surface:
        1. POST /v1/release/candidates           (register the candidate)
        2. POST /v1/release/candidates/:id/verify/runtime
        3. POST /v1/release/candidates/:id/verify/deploy
      Mutually exclusive with the evaluate/policy-sync paths.
    required: false
    default: ''
  control-plane-url:
    description: 'atlasent-control-plane base URL (release-mode only).'
    required: false
  control-plane-token:
    description: |
      Bearer token for the control-plane. Either set this input or the
      ATLASENT_CP_TOKEN env var. Distinct from ATLASENT_API_KEY (which
      authenticates against the runtime). Required when release-mode is set.
    required: false
  release-target-runtime-url:
    description: 'URL of the deployed atlasent-api runtime to probe (release-mode only).'
    required: false
  release-repo:
    description: 'Repository identifier registered with the candidate. Defaults to the current repository.'
    required: false
  release-commit-sha:
    description: 'Commit SHA registered with the candidate. Defaults to the current commit SHA.'
    required: false
  release-image-digest:
    description: 'Optional image digest (e.g. sha256:...) registered with the candidate.'
    required: false
  release-semver:
    description: 'Optional semver string registered with the candidate.'
    required: false
  release-environment:
    description: 'preview | staging | production. Required when release-mode is set.'
    required: false
  release-fail-on-verify:
    description: 'When "true" (default), fail the step if either verify/runtime or verify/deploy returns failed/error.'
    required: false
    default: 'true'
  # ── Governance Agents ───────────────────────────────────────────────────────────────────────
  governance-agents:
    description: |
      Comma-separated list of constrained advisory governance-agent slugs to
      run against the current change. Cannot be combined with policy-sync,
      evaluations, action, or release-mode inputs.
    required: false
    default: ''
  governance-change-id:
    description: 'Governed change UUID to attach findings to. Required when governance-agents is set.'
    required: false
    default: ''
  governance-artifact-file:
    description: 'Optional path to a JSON file mapping agent slug to a pre-built artifact.'
    required: false
    default: ''
  governance-fail-on-severity:
    description: |
      Minimum severity (info|low|medium|high|blocker) that fails the step.
      Findings are advisory by default.
    required: false
    default: ''
  governance-fail-on-blocker:
    description: 'Shortcut for governance-fail-on-severity: blocker.'
    required: false
    default: 'false'
  # ── Outbound notifications ───────────────────────────────────────────────────────────
  slack-webhook:
    description: |
      Slack Incoming Webhook URL. When set, the action posts an informational
      Block Kit message to this URL whenever the deploy gate returns deny,
      hold, or escalate. This is outbound notification only — no interactive
      approval buttons. For in-flow approvals, use the AtlaSent Slack Approval
      Bot instead (configured in the AtlaSent console).
      Best-effort: webhook failures are logged as warnings and never block or
      alter the gate decision.
    required: false
    default: ''
  pr-comment-on-deny:
    description: |
      When "true" (default), post a comment to the pull request when the gate
      returns deny, hold, or escalate and a PR number is detected in the
      workflow context. Requires: permissions: pull-requests: write in the
      workflow, and GITHUB_TOKEN must be available.
      Best-effort: comment failures are logged as warnings and never block or
      alter the gate decision. Set to "false" to suppress PR comments.
    required: false
    default: 'true'
  # ── Post-deploy compliance evidence bundle ────────────────────────────────────────────
  evidence-bundle:
    description: |
      When set to "true" or a regime identifier, call POST /v1/orgs/{orgId}/evidence-exports
      after a successful authorization gate.
      Accepted values: 'false' | 'true' | 'soc2_type_ii' | 'hipaa' | 'gdpr'
    required: false
    default: 'false'
  evidence-bundle-days:
    description: 'Lookback window in days for the evidence bundle (default: 90).'
    required: false
    default: '90'
  # ── VQP Re-Derivation Verify ───────────────────────────────────────────────────────────
  vqp-snapshot-id:
    description: |
      UUID of the VQP snapshot to re-derive and audit. Mutually exclusive with
      evaluate, policy-sync, release-mode, governance-agents, and trajectory-verify.
    required: false
    default: ''
  vqp-supabase-url:
    description: 'Supabase project URL for the VQP edge functions. Required when vqp-snapshot-id is set.'
    required: false
    default: ''
  vqp-service-role-key:
    description: 'Supabase service role key. Required when vqp-snapshot-id is set.'
    required: false
    default: ''
  vqp-rerun:
    description: 'When "true", re-run the AI engine on the re-derived prompt to detect score drift.'
    required: false
    default: 'false'
  vqp-fail-on-drift:
    description: 'When "true" (default), fail the job if hash_match=false or verdict_changed=true.'
    required: false
    default: 'true'
  # ── Trajectory Authorization ─────────────────────────────────────────────────────────────
  trajectory-verify:
    description: |
      When "true", run in trajectory-verify mode: call POST /v1/trajectory-verify
      at this CI step and fail if on_trajectory=false. Use as an intermediate step
      before each critical execution unit in the authorized trajectory.
      Requires trajectory-permit-id and trajectory-step-id from the upstream
      evaluate step that returned an authorized_trajectory.
      Mutually exclusive with policy-sync, governance-agents, release-mode, and vqp-snapshot-id.
    required: false
    default: 'false'
  trajectory-permit-id:
    description: 'Authorized transition spec ID from the upstream AtlaSent evaluate step (evaluation-id output). Required when trajectory-verify is "true".'
    required: false
    default: ''
  trajectory-step-id:
    description: 'Step ID within the trajectory being verified. Must match a step_id in the authorized_trajectory. Required when trajectory-verify is "true".'
    required: false
    default: ''
  trajectory-step-name:
    description: 'Human-readable step name written to the job summary and audit log. Optional.'
    required: false
    default: ''
  trajectory-halt-on-deviation:
    description: |
      When "true" (default), fail the CI job immediately when on_trajectory=false.
      Set to "false" to surface deviation outputs without failing — useful for
      dry-run or advisory monitoring pipelines.
    required: false
    default: 'true'
outputs:
  decision:
    description: 'The evaluation decision (allow/deny/hold/escalate). Set for single-eval path only.'
  permit-token:
    description: 'The permit token consumed by the gate (audit reference; single-use, already consumed by v1-verify-permit). Single-eval path only.'
  evaluation-id:
    description: 'The evaluation ID for audit trail. Single-eval path only.'
  proof-hash:
    description: 'The cryptographic proof hash. Single-eval path only.'
  risk-score:
    description: 'The numeric risk score from the Decision response. Empty string when the evaluator did not return a risk assessment. Single-eval path only.'
  verified:
    description: '"true" when evaluate=allow AND verify-permit=true for ALL evaluations; "false" otherwise (fail-closed). Set on both single and batch paths.'
  decisions:
    description: 'JSON array of per-item decision results for the batch path. Each item: {decision, verified, evaluationId, permitToken, reasons, verifyOutcome}.'
  batch-id:
    description: 'Batch identifier for batch evaluations (either the server-assigned batchId or loop-<ts> for the sequential fallback).'
  financial-governance-advice:
    description: 'JSON advisory output from financial governance assessment'
  chain-entry:
    description: 'v1.1 immutable audit chain entry (JSON)'
    value: ${{ steps.gate.outputs.chain-entry }}
  snapshot:
    description: 'Decision snapshot (JSON)'
    value: ${{ steps.gate.outputs.snapshot }}
  audit-hash:
    description: 'SHA-256 audit chain hash'
    value: ${{ steps.gate.outputs.audit-hash }}
  evidence-receipt:
    description: |
      Signed per-decision authorization receipt (JSON). HMAC-SHA256 signed when
      ATLASENT_RECEIPT_SIGNING_SECRET is set as an Actions secret. null on denial.
  evidence-bundle:
    description: |
      Full compliance evidence bundle (JSON, v1 envelope). null on denial.
  # ── Policy Sync outputs ──────────────────────────────────────────────────────────────────
  sync-run-id:
    description: 'The policy sync run ID returned by v1-policy-sync.'
  sync-status:
    description: 'Terminal status of the sync run (completed, rejected, failed, error).'
  sync-diff:
    description: 'Human-readable diff summary, e.g. "+3 added, ~1 updated, -2 removed".'
  sync-summary:
    description: 'JSON {added, updated, removed, status}.'
  # ── Behavior Insights outputs ───────────────────────────────────────────────────────────
  insights-fired:
    description: 'JSON array of behavior insights campaigns that fired for the subject.'
  insights-skipped:
    description: 'JSON array of behavior insights campaigns that were skipped, with reasons.'
  # ── Release-candidate outputs ──────────────────────────────────────────────────────────────
  release-candidate-id:
    description: 'Candidate ID returned by POST /v1/release/candidates (release-mode only).'
  release-runtime-status:
    description: 'Outcome status of the runtime verification: passed | failed | partial | error.'
  release-deploy-status:
    description: 'Outcome status of the deploy verification: passed | failed | partial | error.'
  release-runtime-result:
    description: 'Full JSON result of the runtime verification.'
  release-deploy-result:
    description: 'Full JSON result of the deploy verification.'
  # ── Governance Agents outputs ───────────────────────────────────────────────────────────
  governance-findings-count:
    description: 'Total number of findings emitted across all invoked governance agents.'
  governance-highest-severity:
    description: 'Highest severity emitted across all findings (info|low|medium|high|blocker).'
  governance-evaluations:
    description: 'JSON array of evaluation summaries per agent.'
  governance-findings:
    description: 'JSON array of all findings across all invoked agents.'
  # ── Evidence bundle outputs ──────────────────────────────────────────────────────────────
  evidence-bundle-sha256:
    description: 'SHA-256 hex digest of the generated compliance evidence bundle.'
  evidence-bundle-id:
    description: 'Evidence export record ID returned by POST /v1/orgs/{orgId}/evidence-exports.'
  # ── VQP Re-Derivation outputs ───────────────────────────────────────────────────────────
  vqp-hash-match:
    description: '"true" when the re-derived SHA-256 hash matches the stored prompt_hash (vqp-verify mode only).'
  vqp-score-delta:
    description: 'Numeric score delta between rerun and original snapshot scores (vqp-verify mode only).'
  vqp-verdict-changed:
    description: '"true" when the verdict flipped between the original snapshot and the AI rerun (vqp-verify mode only).'
  vqp-audit-id:
    description: 'Audit log entry ID written by v1-verify-vqp for this re-derivation run (vqp-verify mode only).'
  # ── Trajectory Verify outputs ───────────────────────────────────────────────────────────
  trajectory-on-trajectory:
    description: '"true" when the current step is on the authorized trajectory; "false" on deviation (trajectory-verify mode only).'
  trajectory-deviation-type:
    description: 'Deviation type on deviation: step_not_on_trajectory | step_out_of_sequence | forbidden_state_reached | required_step_skipped | time_limit_exceeded | constraint_violation | trajectory_expired. Empty string when on trajectory (trajectory-verify mode only).'
  trajectory-fidelity-score:
    description: 'Fidelity score [0-1] representing how closely execution tracks the authorized trajectory so far (trajectory-verify mode only).'
  trajectory-compliance-artifact-id:
    description: 'Compliance comparison artifact ID produced when trajectory execution completes. Empty string mid-execution (trajectory-verify mode only).'
runs:
  using: 'node24'
  main: 'dist/index.js'
