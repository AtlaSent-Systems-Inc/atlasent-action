name: 'AtlaSent Gate'
description: 'Enforce real-time authorization gates on deployments and critical CI/CD actions with cryptographic audit trails'
branding:
  icon: 'shield'
  color: 'green'
inputs:
  api-key:
    description: 'AtlaSent API key (ask_live_* or ask_test_*)'
    required: true
  action:
    description: 'Action type to evaluate (e.g., production_deploy)'
    required: true
  actor:
    description: 'Actor identity (defaults to github.actor)'
    required: false
    default: '${{ github.actor }}'
  target-id:
    description: 'Target resource being acted on (service name, artifact id, etc). Threaded into both top-level target_id and context.target_id so policies can gate on what is being deployed, not just who is deploying.'
    required: false
  environment:
    description: 'Environment (defaults to live for main branch, test otherwise)'
    required: false
  api-url:
    description: 'AtlaSent API URL (defaults to production)'
    required: false
    default: 'https://api.atlasent.io'
  fail-on-deny:
    description: 'Fail the workflow step if the action is denied (default: true)'
    required: false
    default: 'true'
  context:
    description: 'JSON context to include in the evaluation (optional)'
    required: false
    default: '{}'
  evaluations:
    description: 'JSON array of evaluation requests for batch fan-out. Takes precedence over action: when both are set.'
    required: false
  wait-for-id:
    description: 'Evaluation ID to block on when the decision is hold/escalate (streaming-wait).'
    required: false
  wait-timeout-ms:
    description: 'Max milliseconds to wait for a terminal decision when using wait-for-id (default: 10 min).'
    required: false
    default: '600000'
outputs:
  decision:
    description: 'The evaluation decision (allow/deny/hold/escalate)'
  permit-token:
    description: 'The permit token (if allowed)'
  evaluation-id:
    description: 'The evaluation ID for audit trail'
  proof-hash:
    description: 'The cryptographic proof hash'
  risk-score:
    description: 'The numeric risk score from the Decision response. Empty string when the evaluator did not return a risk assessment.'
  decisions-json:
    description: 'JSON array of all evaluation decisions (batch path only).'
runs:
  using: 'node20'
  main: 'dist/index.js'
