name: 'AtlaSent Authorization Gate'
description: 'Gate deployments and CI actions through AtlaSent policy evaluation'
author: 'AtlaSent Systems Inc'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  action:
    description: 'Action verb to evaluate (e.g. deploy, release, merge)'
    required: false
    default: 'deploy'

  # --- Authentication (pick one mode) ---
  auth-mode:
    description: |
      Authentication mode.
      - api-key (default): pass a long-lived API key via the `api-key` input.
      - oidc: keyless — exchanges the GitHub OIDC JWT for a short-lived AtlaSent
        credential. Requires `permissions: id-token: write` in your workflow.
    required: false
    default: 'api-key'
  api-key:
    description: 'AtlaSent API key (required when auth-mode is api-key)'
    required: false
    default: ''
  oidc-audience:
    description: 'OIDC token audience (only used when auth-mode is oidc)'
    required: false
    default: 'https://atlasent.io'

  # --- Policy targeting ---
  base-url:
    description: 'AtlaSent API base URL'
    required: false
    default: 'https://ihghhasvxtltlbizvkqy.supabase.co/functions/v1'
  agent-id:
    description: 'Agent identifier recorded in the audit log'
    required: false
    default: 'github-actions'
  environment:
    description: 'Target environment: production, staging, or development'
    required: false
    default: 'production'

  # --- Context enrichment ---
  approvals:
    description: 'Number of PR/deployment approvals already received'
    required: false
    default: '0'
  change-window:
    description: 'Scheduled change window identifier (leave blank if none)'
    required: false
    default: ''

  # --- Behaviour ---
  fail-on-deny:
    description: 'Fail the workflow step when AtlaSent denies the action'
    required: false
    default: 'true'

outputs:
  decision:
    description: 'Authorization decision: allow, deny, hold, or escalate'
    value: ${{ steps.evaluate.outputs.decision }}
  permit-token:
    description: 'Signed permit token (present on allow decisions only)'
    value: ${{ steps.evaluate.outputs.permit_token }}
  audit-id:
    description: 'Audit chain entry ID'
    value: ${{ steps.evaluate.outputs.audit_id }}
  deny-reason:
    description: 'Human-readable denial reason (present on non-allow decisions)'
    value: ${{ steps.evaluate.outputs.deny_reason }}

runs:
  using: composite
  steps:
    # ------------------------------------------------------------------ #
    # Step 1 (OIDC mode only): exchange GitHub OIDC JWT for a bearer token
    # ------------------------------------------------------------------ #
    - name: Acquire OIDC credential
      if: inputs.auth-mode == 'oidc'
      id: oidc
      shell: bash
      run: |
        if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
          echo "::error::auth-mode=oidc requires 'permissions: id-token: write' in your workflow."
          exit 1
        fi
        raw_token=$(curl -sSfL \
          -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ inputs.oidc-audience }}" \
          | jq -r '.value')
        if [[ -z "${raw_token}" || "${raw_token}" == "null" ]]; then
          echo "::error::Failed to obtain OIDC token from GitHub."
          exit 1
        fi
        echo "::add-mask::${raw_token}"
        echo "bearer=${raw_token}" >> "${GITHUB_OUTPUT}"

    # ------------------------------------------------------------------ #
    # Step 2: Evaluate the action against AtlaSent policy
    # ------------------------------------------------------------------ #
    - name: Evaluate
      id: evaluate
      shell: bash
      env:
        # Resolve bearer: OIDC token takes precedence over API key.
        _BEARER: ${{ inputs.auth-mode == 'oidc' && steps.oidc.outputs.bearer || inputs.api-key }}
        _BASE_URL: ${{ inputs.base-url }}
      run: |
        if [[ -z "${_BEARER}" ]]; then
          echo "::error::No credential: set api-key or use auth-mode=oidc with id-token write permission."
          exit 1
        fi

        payload=$(jq -n \
          --arg  agent_id      "${{ inputs.agent-id }}" \
          --arg  action        "${{ inputs.action }}" \
          --arg  resource      "${{ github.repository }}" \
          --arg  env           "${{ inputs.environment }}" \
          --arg  sha           "${{ github.sha }}" \
          --arg  ref           "${{ github.ref_name }}" \
          --arg  actor         "${{ github.actor }}" \
          --arg  workflow      "${{ github.workflow }}" \
          --arg  run_id        "${{ github.run_id }}" \
          --argjson approvals  "${{ inputs.approvals }}" \
          --arg  change_window "${{ inputs.change-window }}" \
          --arg  auth_mode     "${{ inputs.auth-mode }}" \
          '{
            agent_id: $agent_id,
            action: { type: $action, resource: $resource },
            context: {
              environment:   $env,
              sha:           $sha,
              ref:           $ref,
              actor:         $actor,
              workflow:      $workflow,
              run_id:        $run_id,
              approvals:     $approvals,
              change_window: $change_window,
              auth_mode:     $auth_mode
            }
          }')

        response=$(curl -sSf \
          -X POST "${_BASE_URL}/v1-evaluate" \
          -H "Authorization: Bearer ${_BEARER}" \
          -H "Content-Type: application/json" \
          --max-time 15 \
          -d "${payload}" 2>&1) || {
            echo "decision=deny"                        >> "${GITHUB_OUTPUT}"
            echo "deny_reason=AtlaSent request failed" >> "${GITHUB_OUTPUT}"
            echo "::error::AtlaSent request failed: ${response}"
            [[ "${{ inputs.fail-on-deny }}" == "true" ]] && exit 1 || exit 0
          }

        decision=$(    echo "${response}" | jq -r '.decision    // "deny"')
        permit_token=$(echo "${response}" | jq -r '.permit_token // empty')
        audit_id=$(    echo "${response}" | jq -r '.audit_id    // empty')
        deny_reason=$( echo "${response}" | jq -r '.deny_reason // .reason // empty')

        echo "decision=${decision}"         >> "${GITHUB_OUTPUT}"
        echo "permit_token=${permit_token}" >> "${GITHUB_OUTPUT}"
        echo "audit_id=${audit_id}"         >> "${GITHUB_OUTPUT}"
        echo "deny_reason=${deny_reason}"   >> "${GITHUB_OUTPUT}"

        [[ -n "${permit_token}" ]] && echo "::add-mask::${permit_token}"

        {
          echo "## AtlaSent Gate: ${decision^^}"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Decision | \`${decision}\` |"
          echo "| Action | \`${{ inputs.action }}\` on \`${{ github.repository }}\` |"
          echo "| Commit | \`${{ github.sha }}\` |"
          echo "| Auth mode | \`${{ inputs.auth-mode }}\` |"
          [[ -n "${deny_reason}"   ]] && echo "| Reason   | ${deny_reason} |"
          [[ -n "${audit_id}"      ]] && echo "| Audit ID | \`${audit_id}\` |"
        } >> "${GITHUB_STEP_SUMMARY}"

        if [[ "${decision}" != "allow" && "${{ inputs.fail-on-deny }}" == "true" ]]; then
          echo "::error::AtlaSent ${decision}: ${deny_reason:-no reason given}"
          exit 1
        fi
