name: AtlaSent Policy Gate
# Calls v1-evaluate then v1-verify-permit; enforces fail-closed semantics by default
description: >-
  Evaluate an action request against AtlaSent policies (v1-evaluate) and verify
  the resulting permit (v1-verify-permit). Implements fail-closed pattern:
  denied unless the policy explicitly allows the action.
author: AtlaSent Systems Inc

inputs:
  atlasent-api-url:
    description: Base URL of your AtlaSent API
    required: true
  atlasent-api-key:
    description: Org-scoped API key with evaluation:execute scope
    required: true
  action-id:
    description: Action identifier to evaluate (e.g. ci.production-deploy)
    required: true
  environment:
    description: Target environment
    required: false
    default: production
  actor-id:
    description: Actor identifier (defaults to github.actor)
    required: false
  context:
    description: JSON string of additional context
    required: false
    default: '{}'
  fail-on-deny:
    description: "Fail the step if decision is deny (fail-closed: true by default)"
    required: false
    default: 'true'

outputs:
  decision:
    description: allow, deny, or require_approval
  permit-id:
    description: Permit ID if decision is allow
  risk-level:
    description: low, medium, high, or critical
  evaluation-id:
    description: Evaluation ID for audit trail

runs:
  using: node20
  main: dist/index.js
