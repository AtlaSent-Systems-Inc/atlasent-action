name: 'AtlaSent Action'
description: 'Block production deploys unless AtlaSent authorizes them. Execution-time authorization for AI agent actions in GxP-regulated life sciences environments.'
author: 'AtlaSent Systems, Inc.'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  atlasent_api_key:
    description: 'AtlaSent API key (use a GitHub secret)'
    required: true
  atlasent_anon_key:
    description: 'AtlaSent public anon key'
    required: true
  action:
    description: 'Action to authorize (e.g., production-deploy, staging-deploy)'
    required: false
    default: 'production-deploy'
  environment:
    description: 'Target environment'
    required: false
    default: 'prod'
  approvals:
    description: 'Number of approvals obtained'
    required: false
    default: '0'
  change_window:
    description: 'Whether within an approved change window (true/false)'
    required: false
    default: 'false'
  atlasent_base_url:
    description: 'AtlaSent API base URL (override for self-hosted)'
    required: false
    default: 'https://ducfnmhveikymmgwpgcd.supabase.co/functions/v1'
  http_timeout_seconds:
    description: 'Per-request HTTP timeout (seconds). Bumped from 30 → 60 to tolerate slow paths on the AtlaSent API.'
    required: false
    default: '60'

outputs:
  decision:
    description: 'Authorization decision: allow or deny'
    value: ${{ steps.eval.outputs.decision }}
  decision_id:
    description: 'Unique evaluation ID for audit trail'
    value: ${{ steps.eval.outputs.decision_id }}
  audit_hash:
    description: 'Tamper-evident hash of the evaluation context'
    value: ${{ steps.eval.outputs.audit_hash }}
  permit_token:
    description: 'Single-use permit token (only set when allowed)'
    value: ${{ steps.eval.outputs.permit_token }}
  verified:
    description: 'Whether the permit was verified at execution time (true/false)'
    value: ${{ steps.verify.outputs.verified }}

runs:
  using: 'composite'
  steps:
    - name: Install jq
      shell: bash
      run: |
        if ! command -v jq &>/dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
        fi

    - name: 'Evaluate — request authorization from AtlaSent'
      id: eval
      shell: bash
      env:
        ATLASENT_API_KEY: ${{ inputs.atlasent_api_key }}
        ATLASENT_ANON_KEY: ${{ inputs.atlasent_anon_key }}
        ATLASENT_BASE_URL: ${{ inputs.atlasent_base_url }}
        HTTP_TIMEOUT: ${{ inputs.http_timeout_seconds }}
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_APPROVALS: ${{ inputs.approvals }}
        INPUT_CHANGE_WINDOW: ${{ inputs.change_window }}
      run: |
        set -euo pipefail
        : "${ATLASENT_API_KEY:?Missing input: atlasent_api_key}"
        : "${ATLASENT_ANON_KEY:?Missing input: atlasent_anon_key}"

        REQUEST_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

        BODY=$(jq -nc \
          --arg agent "github-actions" \
          --arg action "$INPUT_ACTION" \
          --arg request_id "$REQUEST_ID" \
          --arg sha "${GITHUB_SHA}" \
          --arg branch "${GITHUB_REF}" \
          --arg actor "${GITHUB_ACTOR}" \
          --arg environment "$INPUT_ENVIRONMENT" \
          --arg repo "${GITHUB_REPOSITORY}" \
          --arg run_id "${GITHUB_RUN_ID}" \
          --argjson approvals "$INPUT_APPROVALS" \
          --argjson change_window "$INPUT_CHANGE_WINDOW" \
          '{
            agent: $agent,
            action: $action,
            request_id: $request_id,
            context: {
              sha: $sha,
              branch: $branch,
              actor: $actor,
              environment: $environment,
              approvals: $approvals,
              change_window: $change_window,
              repo: $repo,
              run_id: $run_id
            }
          }')

        # Robust HTTP status + body parsing — curl -w emits the body to
        # a file we control, and the HTTP status + Retry-After on stdout
        # in a deterministic format. This replaces the previous `awk`
        # header-split which was fragile to HTTP/2 vs HTTP/1.1 and to
        # any intermediate proxy that injects extra blank lines.
        BODY_FILE=$(mktemp)
        trap 'rm -f "$BODY_FILE"' EXIT

        call_evaluate() {
          curl -sS --max-time "$HTTP_TIMEOUT" \
            -o "$BODY_FILE" \
            -w '%{http_code}\t%header{Retry-After}' \
            -X POST "${ATLASENT_BASE_URL}/v1-evaluate" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${ATLASENT_API_KEY}" \
            -H "apikey: ${ATLASENT_ANON_KEY}" \
            -H "X-Request-ID: ${REQUEST_ID}" \
            -H "User-Agent: atlasent-action/v1 gha/${GITHUB_RUN_ID}" \
            -d "${BODY}"
        }

        ATTEMPT=0
        MAX_ATTEMPTS=2
        while : ; do
          ATTEMPT=$((ATTEMPT + 1))
          RESP=$(call_evaluate) || true
          HTTP_CODE="${RESP%%$'\t'*}"
          RETRY_AFTER="${RESP##*$'\t'}"
          [ "$HTTP_CODE" = "$RETRY_AFTER" ] && RETRY_AFTER=""

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            break
          fi

          # 429 with Retry-After → sleep and retry once.
          if [ "$HTTP_CODE" = "429" ] && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && [ -n "$RETRY_AFTER" ]; then
            SLEEP="${RETRY_AFTER%.*}"
            if [ -z "$SLEEP" ] || [ "$SLEEP" -lt 0 ] 2>/dev/null; then SLEEP=5; fi
            if [ "$SLEEP" -gt 120 ]; then SLEEP=120; fi
            echo "::warning::AtlaSent evaluate rate-limited (HTTP 429); sleeping ${SLEEP}s then retrying"
            sleep "$SLEEP"
            continue
          fi

          # 5xx → one retry with fixed backoff.
          case "$HTTP_CODE" in
            5*)
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                echo "::warning::AtlaSent evaluate returned HTTP ${HTTP_CODE}; retrying after 3s"
                sleep 3
                continue
              fi
              ;;
          esac

          # Surface server-side message when present.
          MSG=$(jq -r '.message // .reason // empty' < "$BODY_FILE" 2>/dev/null || echo "")
          echo "::error::AtlaSent evaluate returned HTTP ${HTTP_CODE} — BLOCKED (fail-closed)${MSG:+: $MSG}"
          exit 1
        done

        JSON=$(cat "$BODY_FILE")

        # Contract: SDK-canonical `permitted` (bool) is authoritative; fall
        # back to native `decision == "allow"` for pre-realignment servers.
        PERMITTED=$(echo "$JSON" | jq -r '.permitted // empty')
        DECISION=$(echo "$JSON" | jq -r '.decision // empty')

        if [ -z "$PERMITTED" ] && [ -z "$DECISION" ]; then
          echo "::error::AtlaSent evaluate returned neither \`permitted\` nor \`decision\` — BLOCKED (fail-closed)"
          exit 1
        fi

        if [ -z "$DECISION" ]; then
          if [ "$PERMITTED" = "true" ]; then DECISION="allow"; else DECISION="deny"; fi
        fi

        DECISION_ID=$(echo "$JSON" | jq -r '.decision_id // .evaluation_id // "none"')
        AUDIT_HASH=$(echo "$JSON" | jq -r '.audit_hash // .audit_entry_hash // .context_hash // "none"')
        REASON=$(echo "$JSON" | jq -r '.reason // .deny_reason // ""')

        echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
        echo "decision_id=$DECISION_ID" >> "$GITHUB_OUTPUT"
        echo "audit_hash=$AUDIT_HASH" >> "$GITHUB_OUTPUT"
        echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"

        # Write to GitHub Actions job summary.
        {
          echo "## AtlaSent Authorization"
          echo ""
          echo "| Field | Value |"
          echo "|---|---|"
          echo "| **Decision** | \`$DECISION\` |"
          echo "| **Decision ID** | \`$DECISION_ID\` |"
          echo "| **Audit Hash** | \`$AUDIT_HASH\` |"
          echo "| **Action** | \`$INPUT_ACTION\` |"
          echo "| **Actor** | \`${GITHUB_ACTOR}\` |"
          echo "| **SHA** | \`${GITHUB_SHA:0:12}\` |"
          echo "| **Branch** | \`${GITHUB_REF}\` |"
          if [ -n "$REASON" ]; then
            echo "| **Reason** | $REASON |"
          fi
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"

        if [ "$DECISION" != "allow" ]; then
          CODE=$(echo "$JSON" | jq -r '.error_code // .deny_code // "unknown"')
          echo "::error::BLOCKED by AtlaSent — decision=$DECISION code=$CODE reason=$REASON"
          exit 1
        fi

        PERMIT_TOKEN=$(echo "$JSON" | jq -r '.permit_token // .permit // empty')
        if [ -z "$PERMIT_TOKEN" ] || [ "$PERMIT_TOKEN" = "null" ]; then
          echo "::error::AtlaSent allowed but no permit_token — BLOCKED (fail-closed)"
          exit 1
        fi

        # Mask the single-use permit token from all subsequent logs.
        # Without this, the token prints verbatim wherever the output is
        # referenced (downstream steps, summaries, 3rd-party actions).
        echo "::add-mask::$PERMIT_TOKEN"
        echo "permit_token=$PERMIT_TOKEN" >> "$GITHUB_OUTPUT"

    - name: 'Verify — confirm permit at execution time'
      id: verify
      shell: bash
      env:
        ATLASENT_API_KEY: ${{ inputs.atlasent_api_key }}
        ATLASENT_ANON_KEY: ${{ inputs.atlasent_anon_key }}
        ATLASENT_BASE_URL: ${{ inputs.atlasent_base_url }}
        HTTP_TIMEOUT: ${{ inputs.http_timeout_seconds }}
        PERMIT_TOKEN: ${{ steps.eval.outputs.permit_token }}
        EVAL_REQUEST_ID: ${{ steps.eval.outputs.request_id }}
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_APPROVALS: ${{ inputs.approvals }}
        INPUT_CHANGE_WINDOW: ${{ inputs.change_window }}
      run: |
        set -euo pipefail

        # Explicit null-guard. The evaluate step already exits on empty
        # permit_token, but we belt-and-suspender here: if someone forks
        # the action and forgets to carry the token through, we want a
        # loud, typed failure rather than a silent "null permit" POST.
        if [ -z "${PERMIT_TOKEN:-}" ] || [ "$PERMIT_TOKEN" = "null" ]; then
          echo "::error::Verify step reached with empty permit_token — refusing to call /v1-verify-permit"
          echo "verified=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        # The evaluate step already masks PERMIT_TOKEN; re-masking here
        # is a no-op in the same job but protects re-use patterns.
        echo "::add-mask::$PERMIT_TOKEN"

        VERIFY_ID="verify-${EVAL_REQUEST_ID}"

        BODY=$(jq -nc \
          --arg permit_token "${PERMIT_TOKEN}" \
          --arg agent "github-actions" \
          --arg action "$INPUT_ACTION" \
          --arg request_id "${VERIFY_ID}" \
          --arg sha "${GITHUB_SHA}" \
          --arg branch "${GITHUB_REF}" \
          --arg actor "${GITHUB_ACTOR}" \
          --arg environment "$INPUT_ENVIRONMENT" \
          --arg repo "${GITHUB_REPOSITORY}" \
          --arg run_id "${GITHUB_RUN_ID}" \
          --argjson approvals "$INPUT_APPROVALS" \
          --argjson change_window "$INPUT_CHANGE_WINDOW" \
          '{
            permit_token: $permit_token,
            decision_id: $permit_token,
            agent: $agent,
            action: $action,
            request_id: $request_id,
            context: {
              sha: $sha,
              branch: $branch,
              actor: $actor,
              environment: $environment,
              approvals: $approvals,
              change_window: $change_window,
              repo: $repo,
              run_id: $run_id
            }
          }')

        BODY_FILE=$(mktemp)
        trap 'rm -f "$BODY_FILE"' EXIT

        call_verify() {
          curl -sS --max-time "$HTTP_TIMEOUT" \
            -o "$BODY_FILE" \
            -w '%{http_code}\t%header{Retry-After}' \
            -X POST "${ATLASENT_BASE_URL}/v1-verify-permit" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${ATLASENT_API_KEY}" \
            -H "apikey: ${ATLASENT_ANON_KEY}" \
            -H "X-Request-ID: ${VERIFY_ID}" \
            -H "User-Agent: atlasent-action/v1 gha/${GITHUB_RUN_ID}" \
            -d "${BODY}"
        }

        ATTEMPT=0
        MAX_ATTEMPTS=2
        while : ; do
          ATTEMPT=$((ATTEMPT + 1))
          RESP=$(call_verify) || true
          HTTP_CODE="${RESP%%$'\t'*}"
          RETRY_AFTER="${RESP##*$'\t'}"
          [ "$HTTP_CODE" = "$RETRY_AFTER" ] && RETRY_AFTER=""

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            break
          fi

          if [ "$HTTP_CODE" = "429" ] && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && [ -n "$RETRY_AFTER" ]; then
            SLEEP="${RETRY_AFTER%.*}"
            if [ -z "$SLEEP" ] || [ "$SLEEP" -lt 0 ] 2>/dev/null; then SLEEP=5; fi
            if [ "$SLEEP" -gt 120 ]; then SLEEP=120; fi
            echo "::warning::AtlaSent verify rate-limited (HTTP 429); sleeping ${SLEEP}s then retrying"
            sleep "$SLEEP"
            continue
          fi

          case "$HTTP_CODE" in
            5*)
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                echo "::warning::AtlaSent verify returned HTTP ${HTTP_CODE}; retrying after 3s"
                sleep 3
                continue
              fi
              ;;
          esac

          MSG=$(jq -r '.message // .reason // empty' < "$BODY_FILE" 2>/dev/null || echo "")
          echo "::error::AtlaSent verify returned HTTP ${HTTP_CODE} — BLOCKED (fail-closed)${MSG:+: $MSG}"
          echo "verified=false" >> "$GITHUB_OUTPUT"
          exit 1
        done

        JSON=$(cat "$BODY_FILE")
        VERIFIED=$(echo "$JSON" | jq -r '.verified // empty')
        OUTCOME=$(echo "$JSON" | jq -r '.outcome // .decision // empty')
        VALID=$(echo "$JSON" | jq -r '.valid // empty')

        # Canonical `verified` (bool) is authoritative; legacy servers
        # emit only `valid`. Either must be true for a pass.
        if [ "$VERIFIED" != "true" ] && [ "$VALID" != "true" ]; then
          REASON=$(echo "$JSON" | jq -r '.reason // .deny_reason // "verification failed"')
          echo "::error::AtlaSent permit verification FAILED — $REASON"
          echo "verified=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        if [ -n "$OUTCOME" ] && [ "$OUTCOME" != "allow" ] && [ "$OUTCOME" != "verified" ]; then
          REASON=$(echo "$JSON" | jq -r '.reason // .deny_reason // "unknown outcome"')
          echo "::error::AtlaSent permit verification outcome=${OUTCOME} — $REASON"
          echo "verified=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        echo "verified=true" >> "$GITHUB_OUTPUT"

        # Append verification to summary
        {
          echo "| **Verified** | ✅ permit confirmed at execution time |"
        } >> "$GITHUB_STEP_SUMMARY"
